const Btn = ({children, onClick, primary, small, danger, disabled, style:s}) => (

    padding:small?"6px 16px":"8px 20px", borderRadius:20,
    border:primary||danger?"none":`1.5px solid ${danger?C.danger:C.pri}`,
    background:disabled?"#ccc":danger?C.danger:primary?C.pri:"transparent",
    color:primary||danger?"#fff":C.pri, fontSize:13, fontWeight:600,
    cursor:disabled?"not-allowed":"pointer", transition:"all 0.15s",
    letterSpacing:0.2, ...s
  }}>{children}</button>
);

const Card = ({children, style:s, onClick}) => (
  <div onClick={onClick} style={{
    background:C.white, border:`1px solid ${C.brd}`, borderRadius:8,
    overflow:"hidden", marginBottom:8, transition:"box-shadow 0.2s",
    boxShadow:"0 0 0 1px rgba(0,0,0,0.08)",

);

const Avatar = ({initials, size=40, color=C.pri, src}) => (
  <div style={{
    width:size, height:size, borderRadius:"50%", background:color,
    display:"flex", alignItems:"center", justifyContent:"center",
    color:"#fff", fontWeight:600, fontSize:size*0.35, flexShrink:0,
    overflow:"hidden"
  }}>{src ? <img src={src} style={{width:"100%",height:"100%",objectFit:"cover"}} /> : initials}</div>
);

const ScoreRing = ({score, size=40}) => {
  const color = score >= 85 ? C.suc : score >= 70 ? C.pri : C.acc;
  const r = (size-5)/2, circ = 2*Math.PI*r, off = circ-(score/100)*circ;
  return (
    <svg width={size} height={size} style={{flexShrink:0}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={C.brd} strokeWidth={2.5}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={2.5}
        strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round"
        transform={`rotate(-90 ${size/2} ${size/2})`} style={{transition:"stroke-dashoffset 0.8s ease"}}/>
      <text x={size/2} y={size/2} textAnchor="middle" dominantBaseline="central"
        fontSize={size*0.32} fontWeight={600} fill={color}>{score}</text>
    </svg>
  );
};

        </div>
        <div style={{background:C.white,display:"flex",flexDirection:"column"}}>
          <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.brd}`,display:"flex",alignItems:"center",gap:10}}>
            <Avatar initials="JD" size={38}/>
            <div>
              <div style={{fontWeight:600,fontSize:14}}>Juan Dela Cruz</div>
              <div style={{fontSize:12,color:C.suc}}>● Online</div>
            </div>
            <div style={{marginLeft:"auto",display:"flex",gap:8}}>
              <Btn small onClick={()=>onNav("profile")}>View Profile</Btn>
            </div>
          </div>
          <div style={{padding:"8px 16px",background:C.priLt,fontSize:12,color:C.priDk,display:"flex",alignItems:"center",gap:6}}>
            📋 Juan is on your shortlist for MT Pacific Voyager (3rd Officer)
          </div>
          <div style={{flex:1,padding:16,overflowY:"auto"}}>
            <div style={{textAlign:"center",fontSize:11,color:C.t3,marginBottom:16}}>Today</div>
            {msgs.map((msg,i) => (
              <div key={i} style={{display:"flex",justifyContent:msg.from==="me"?"flex-end":"flex-start",marginBottom:10}}>
                <div style={{
                  maxWidth:"70%",padding:"10px 14px",
                  borderRadius:msg.from==="me"?"16px 16px 4px 16px":"16px 16px 16px 4px",
                  background:msg.from==="me"?C.pri:C.surf,
                  color:msg.from==="me"?"#fff":C.t1,
                  fontSize:13,lineHeight:1.5
                }}>
                  {msg.text}
                  <div style={{fontSize:10,marginTop:4,opacity:0.6,textAlign:"right"}}>{msg.time}</div>
                </div>
              </div>
            ))}
          </div>
          <div style={{padding:12,borderTop:`1px solid ${C.brd}`,display:"flex",gap:8}}>
            <input
              value={newMsg} onChange={e=>setNewMsg(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&sendMessage()}
              placeholder="Type a message..."
              style={{flex:1,padding:"10px 16px",borderRadius:24,border:`1px solid ${C.brd}`,fontSize:13,outline:"none"}}
            />
            <div onClick={sendMessage} style={{
              width:38,height:38,borderRadius:"50%",background:C.pri,
              display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"
            }}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};

// ============ SCREEN: NOTIFICATIONS ============
const NotificationsScreen = () => {
  const [notifs, setNotifs] = useState(NOTIFICATIONS);
  const icons = {shortlist:"📋",view:"👁",message:"💬",match:"⚡",system:"⚠️"};
  return (
    <div style={{maxWidth:1280,margin:"0 auto",padding:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <h2 style={{fontSize:18,fontWeight:600}}>Notifications</h2>
        <Btn small onClick={()=>setNotifs(notifs.map(n=>({...n,read:true})))}>Mark all read</Btn>
      </div>
      {notifs.map((n,i) => (
        <Card key={i} style={{padding:"14px 16px",background:n.read?C.white:C.priLt,cursor:"pointer"}}
          onClick={()=>{const u=[...notifs];u[i].read=true;setNotifs(u);}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <span style={{fontSize:20}}>{icons[n.type]}</span>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:n.read?400:600}}>{n.text}</div>
              <div style={{fontSize:11,color:C.t3,marginTop:2}}>{n.time}</div>
            </div>
            {!n.read && <div style={{width:8,height:8,borderRadius:"50%",background:C.pri}}/>}
          </div>
        </Card>
      ))}
    </div>
  );
};

// ============ SCREEN: SETTINGS ============
const SettingsScreen = () => (
  <div style={{maxWidth:1280,margin:"0 auto",padding:16}}>
    <h2 style={{fontSize:18,fontWeight:600,marginBottom:16}}>Settings & privacy</h2>
    <Card style={{padding:20}}>
      <SectionTitle>Profile visibility</SectionTitle>
      <div style={{display:"flex",flexDirection:"column",gap:12,marginTop:8}}>
        {[{l:"Profile visible to shipowners",v:true},{l:"Profile visible to manning agents",v:true},{l:"Show in search results",v:true},{l:"Show availability status",v:true},{l:"Allow messages from non-connections",v:false}].map((s,i) => (
          <label key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:13,cursor:"pointer"}}>
            <span>{s.l}</span>
            <input type="checkbox" defaultChecked={s.v} style={{accentColor:C.pri,width:18,height:18}}/>
          </label>
        ))}
      </div>
    </Card>
    <Card style={{padding:20}}>
      <SectionTitle>Subscription</SectionTitle>
      <div style={{display:"flex",gap:12,marginTop:8}}>
        <Card style={{flex:1,padding:16,border:`2px solid ${C.pri}`,textAlign:"center"}}>
          <Badge color={C.pri} bg={C.priLt}>Current plan</Badge>
          <div style={{fontWeight:700,fontSize:18,marginTop:8}}>Premium</div>
          <div style={{fontSize:12,color:C.t2}}>AI Career Advisor, BI Insights, Priority visibility</div>
        </Card>
        <Card style={{flex:1,padding:16,textAlign:"center"}}>
          <div style={{fontWeight:700,fontSize:18}}>Enterprise</div>
          <div style={{fontSize:12,color:C.t2,marginBottom:8}}>Custom API, dedicated support, white-label</div>
          <Btn small>Upgrade</Btn>
        </Card>
      </div>
    </Card>
    <Card style={{padding:20}}>
      <SectionTitle>Data & privacy</SectionTitle>
      <div style={{fontSize:13,color:C.t2,lineHeight:1.6}}>
        Your data is processed in compliance with the Philippine Data Privacy Act (R.A. 10173) and our Seafarer Consent & Data Processing Agreement. You can exercise your data subject rights at any time.
      </div>
      <div style={{display:"flex",gap:8,marginTop:12}}>
        <Btn small>Download my data</Btn>
        <Btn small>Manage consent</Btn>
        <Btn small danger>Delete account</Btn>
      </div>
    </Card>
  </div>
);

// ============ MAIN APP ============
const App = () => {
  const [page, setPage] = useState("feed");
  const unreadCount = NOTIFICATIONS.filter(n=>!n.read).length;

  return (
    <div style={{background:C.surf,minHeight:"100vh"}}>
      <Navbar active={page} onNav={setPage} unreadCount={unreadCount}/>
      {page==="feed" && <FeedScreen onNav={setPage}/>}
      {page==="search" && <SearchScreen onNav={setPage}/>}
      {page==="profile" && <ProfileScreen onNav={setPage}/>}
      {page==="shortlist" && <ShortlistScreen onNav={setPage}/>}
      {page==="agent" && <AgentScreen onNav={setPage}/>}
      {page==="messages" && <MessagesScreen onNav={setPage}/>}
      {page==="notifications" && <NotificationsScreen/>}
      {page==="settings" && <SettingsScreen/>}
    </div>
  );
};

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
