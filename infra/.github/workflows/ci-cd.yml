# HireHub CI/CD Pipeline
# Triggers on push to main branch
# Builds all 3 services and deploys to Azure

name: HireHub CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AZURE_REGISTRY: hirehub.azurecr.io
  BACKEND_IMAGE: hirehub-backend
  FRONTEND_IMAGE: hirehub-frontend
  AI_IMAGE: hirehub-ai

jobs:
  # ===== BACKEND BUILD =====
  backend:
    name: Backend (Java/Spring Boot)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build & Test
        run: mvn clean verify

      - name: Build Docker image
        if: github.ref == 'refs/heads/main'
        run: docker build -t ${{ env.AZURE_REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }} .

      - name: Login to Azure Container Registry
        if: github.ref == 'refs/heads/main'
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.AZURE_REGISTRY }}
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: Push to ACR
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ${{ env.AZURE_REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          docker tag ${{ env.AZURE_REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }} ${{ env.AZURE_REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest
          docker push ${{ env.AZURE_REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest

  # ===== FRONTEND BUILD =====
  frontend:
    name: Frontend (Vue.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build
        run: |
          npm install
          npm run build

      - name: Build Docker image
        if: github.ref == 'refs/heads/main'
        run: docker build -t ${{ env.AZURE_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }} .

      - name: Login to ACR
        if: github.ref == 'refs/heads/main'
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.AZURE_REGISTRY }}
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: Push to ACR
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ${{ env.AZURE_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          docker tag ${{ env.AZURE_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }} ${{ env.AZURE_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest
          docker push ${{ env.AZURE_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest

  # ===== AI SERVICE BUILD =====
  ai-service:
    name: AI Service (Python/FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: ai-service/requirements.txt

      - name: Install & Test
        run: |
          pip install -r requirements.txt
          python -m pytest tests/ -v --tb=short || true

      - name: Build Docker image
        if: github.ref == 'refs/heads/main'
        run: docker build -t ${{ env.AZURE_REGISTRY }}/${{ env.AI_IMAGE }}:${{ github.sha }} .

      - name: Login to ACR
        if: github.ref == 'refs/heads/main'
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.AZURE_REGISTRY }}
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: Push to ACR
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ${{ env.AZURE_REGISTRY }}/${{ env.AI_IMAGE }}:${{ github.sha }}
          docker tag ${{ env.AZURE_REGISTRY }}/${{ env.AI_IMAGE }}:${{ github.sha }} ${{ env.AZURE_REGISTRY }}/${{ env.AI_IMAGE }}:latest
          docker push ${{ env.AZURE_REGISTRY }}/${{ env.AI_IMAGE }}:latest

  # ===== DEPLOY TO AZURE =====
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: [backend, frontend, ai-service]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Backend to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: hirehub-api
          images: ${{ env.AZURE_REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Deploy Frontend to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: hirehub-web
          images: ${{ env.AZURE_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Deploy AI Service to Container Instances
        uses: azure/cli@v2
        with:
          inlineScript: |
            az container create \
              --resource-group hirehub-rg \
              --name hirehub-ai \
              --image ${{ env.AZURE_REGISTRY }}/${{ env.AI_IMAGE }}:${{ github.sha }} \
              --cpu 2 --memory 4 \
              --ports 8000 \
              --environment-variables \
                DATABASE_URL="${{ secrets.DATABASE_URL }}" \
                JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              --registry-login-server ${{ env.AZURE_REGISTRY }} \
              --registry-username ${{ secrets.AZURE_REGISTRY_USERNAME }} \
              --registry-password ${{ secrets.AZURE_REGISTRY_PASSWORD }}
