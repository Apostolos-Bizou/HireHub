server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: hirehub-api

  # PostgreSQL
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:hirehub}
    username: ${DB_USER:hirehub}
    password: ${DB_PASS:hirehub}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Jackson
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  # File upload limits
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

# JWT Configuration
hirehub:
  jwt:
    secret: ${JWT_SECRET:CHANGE_ME_IN_PRODUCTION_hirehub_jwt_secret_key_2026_must_be_at_least_256_bits}
    access-token-expiration: 3600000      # 1 hour
    refresh-token-expiration: 2592000000  # 30 days

  # AI Microservice
  ai-service:
    base-url: ${AI_SERVICE_URL:http://localhost:8000}
    timeout: 30000

  # Azure Blob Storage
  azure:
    storage:
      connection-string: ${AZURE_STORAGE_CONNECTION:DefaultEndpointsProtocol=https;AccountName=hirehub;AccountKey=CHANGE_ME}
      container-name: ${AZURE_STORAGE_CONTAINER:hirehub-files}

  # CORS
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true
    max-age: 3600

# Logging
logging:
  level:
    com.hirehub: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# Springdoc / Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
  info:
    title: HireHub API
    description: The Professional Network for Maritime Crew
    version: 1.0.0

---
# Production profile
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    hikari:
      maximum-pool-size: 40

  jpa:
    properties:
      hibernate:
        format_sql: false

  flyway:
    baseline-on-migrate: false

logging:
  level:
    com.hirehub: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
